name: Book Shop - CI/CD Checks

on: [push]

jobs:
  test-lint:
    name: Test and Lint Book Shop Project
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Linting
        run: echo "Running linting for Book Shop..."

      - name: Run Tests
        run: echo "Running tests for Book Shop..."